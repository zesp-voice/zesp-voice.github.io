<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.gstatic.com https://script.google.com https://script.googleusercontent.com;">
<title>관리자 · 변화관리 의견 광장</title>
<meta name="theme-color" content="#D20015">
<link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<header class="topbar">
  <div class="wrap topbar__inner">
    <a class="brand" href="./index.html">
      <span class="brand__icon" aria-hidden="true"></span>
      <span class="brand__lockup">
        <span class="brand__name">변화관리 의견 광장 관리자</span>
        <span class="brand__sub">이스타항공 안전보안실</span>
      </span>
    </a>
    <nav class="topbar__nav">
      <a href="./index.html">홈</a>
      <a href="./about.html">변화관리란</a>
      <a href="./admin.html" id="nav-admin" aria-current="page">관리자</a>
      <span id="admin-chip" class="admin-chip hidden">
        <a class="admin-chip__link" href="./admin.html" title="관리자 페이지">
          <span class="admin-chip__dot" aria-hidden="true"></span>
          <span class="admin-chip__label" id="admin-chip-label">관리자</span>
        </a>
        <button id="admin-signout" class="admin-chip__signout" title="관리자 로그아웃">로그아웃</button>
      </span>
    </nav>
  </div>
</header>

<!-- 관리자 로그인 게이트 -->
<section id="gate" class="section">
  <div class="wrap wrap--narrow">
    <div class="chart-card admin-login-card">
      <div class="eyebrow" style="margin-bottom: var(--sp-3);">ADMIN ACCESS</div>
      <h2 style="margin: 0 0 var(--sp-5); font-size: 32px; font-weight: 800; letter-spacing: -0.02em;">관리자 인증</h2>
      <div class="stack">
        <div class="field">
          <label for="admin-id">ID</label>
          <input id="admin-id" class="input" type="text" autocomplete="username" placeholder="관리자 ID">
        </div>
        <div class="field">
          <label for="pw-input">PW</label>
          <input id="pw-input" class="input" type="password" autocomplete="current-password" placeholder="">
        </div>
        <label class="check-row" for="auto-login">
          <input id="auto-login" type="checkbox">
          <span>자동 로그인</span>
        </label>
        <div id="auth-err" class="alert alert--danger hidden">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m12 3 10 17H2z"/><path d="M12 10v4M12 17v.01"/></svg>
          <div id="auth-err-msg"></div>
        </div>
        <button id="login-btn" class="btn btn--primary btn--lg">로그인</button>
      </div>
    </div>
  </div>
</section>

<!-- 관리자 본문 -->
<main id="admin-main" class="wrap section hidden">

  <div class="row row--between" style="margin-bottom: var(--sp-3);">
    <div>
      <div class="eyebrow">DASHBOARD</div>
      <h1 style="margin: 6px 0 0; font-size: 40px; font-weight: 800; letter-spacing: -0.02em;">주제 관리</h1>
    </div>
    <button id="new-topic-btn" class="btn btn--primary">+ 새 주제 등록</button>
  </div>

  <p class="text-mute text-small" style="margin: 0 0 var(--sp-6);">
    주제를 등록하면 임직원이 익명으로 의견을 남길 수 있습니다. 마감일이 지나면 자동으로 의견 수집이 종료됩니다.
  </p>

  <!-- 운영 도구 -->
  <div class="chart-card" style="margin-bottom: var(--sp-4);">
    <div class="row row--between" style="flex-wrap: wrap; gap: var(--sp-3);">
      <div>
        <div class="kpi__lbl">운영 도구</div>
        <div class="text-mute text-small" style="margin-top: 4px;">데이터 내보내기·동기화·QR 생성</div>
      </div>
      <div class="row">
        <button id="site-qr-btn" class="btn btn--ghost btn--sm" title="사이트 대표 QR (zesp-voice.github.io)">사이트 대표 QR</button>
        <button id="export-all-btn" class="btn btn--secondary btn--sm">전체 XLSX 내보내기</button>
        <button id="sync-sheets-btn" class="btn btn--ghost btn--sm">Sheets 동기화</button>
      </div>
    </div>
    <div id="ops-msg" class="hidden" style="margin-top: var(--sp-3);"></div>
  </div>

  <!-- 주제 리스트 -->
  <h2 class="h-section">등록된 주제</h2>
  <div id="admin-topics" class="stack stack--tight">
    <div class="empty">
      <div class="spinner" aria-hidden="true"></div>
      <div class="empty__title">불러오는 중…</div>
    </div>
  </div>
</main>

<!-- 주제 편집 모달 -->
<div id="topic-modal" class="modal-bg hidden">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal__head">
      <h3 class="modal__title" id="modal-title">새 주제 등록</h3>
      <button class="icon-btn" data-close>✕</button>
    </div>
    <div class="modal__body">
      <div class="stack stack--loose">
        <div class="row" style="gap: var(--sp-3);">
          <div class="field" style="flex: 0 0 80px;">
            <label for="topic-emoji">이모지</label>
            <button id="emoji-picker-btn" class="emoji-picker__button" type="button" aria-haspopup="dialog" aria-expanded="false">
              <span id="emoji-picker-current">✈️</span>
            </button>
            <input id="topic-emoji" type="hidden" value="✈️">
          </div>
          <div class="field" style="flex: 1;">
            <label for="topic-title">주제 제목</label>
            <input id="topic-title" class="input" maxlength="80" placeholder="예) 8월 대구 신규취항 관련 의견 수집">
          </div>
        </div>
        <div id="emoji-picker-panel" class="emoji-picker hidden" role="dialog" aria-label="이모지 선택">
          <div class="emoji-picker__search">
            <input id="emoji-search" class="input" type="search" placeholder="이모지 검색: 항공, 안전, 교육, 시스템...">
          </div>
          <div id="emoji-options" class="emoji-picker__grid"></div>
        </div>
        <div class="field">
          <label for="topic-desc">설명 (마크다운 미지원, 줄바꿈 가능)</label>
          <textarea id="topic-desc" class="textarea" maxlength="800" placeholder="임직원에게 보일 안내문을 작성해주세요."></textarea>
        </div>
        <div class="row" style="gap: var(--sp-3);">
          <div class="field" style="flex: 1;">
            <label for="topic-due">마감일</label>
            <input id="topic-due" class="input" type="date">
          </div>
          <div class="field" style="flex: 1;">
            <label for="topic-status">상태</label>
            <select id="topic-status" class="select">
              <option value="active">진행 중</option>
              <option value="closed">종료</option>
            </select>
          </div>
        </div>
        <div id="modal-err" class="alert alert--danger hidden">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m12 3 10 17H2z"/><path d="M12 10v4M12 17v.01"/></svg>
          <div id="modal-err-msg"></div>
        </div>
      </div>
    </div>
    <div class="modal__foot">
      <button id="topic-delete" class="btn btn--tertiary hidden" style="color: var(--ej-red);">삭제</button>
      <span class="spacer"></span>
      <button class="btn btn--tertiary" data-close>취소</button>
      <button id="topic-save" class="btn btn--primary">저장</button>
    </div>
  </div>
</div>

<!-- QR 모달 -->
<div id="qr-modal" class="modal-bg hidden">
  <div class="modal" style="max-width: 420px;" role="dialog" aria-modal="true" aria-labelledby="qr-modal-title">
    <div class="modal__head">
      <h3 class="modal__title" id="qr-modal-title">QR 코드</h3>
      <button class="icon-btn" data-close>✕</button>
    </div>
    <div class="modal__body" style="text-align: center;">
      <div id="qr-target" style="display: inline-block; padding: var(--sp-5); background: white; border-radius: var(--rad-3);"></div>
      <div id="qr-url" class="mono text-small text-mute" style="margin-top: var(--sp-4); word-break: break-all;"></div>
    </div>
    <div class="modal__foot">
      <button class="btn btn--tertiary" data-close>닫기</button>
      <button id="qr-download" class="btn btn--primary">PNG 다운로드</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="wrap footer__inner">
    <div>© EASTARJET 안전기획팀 · 변화관리 의견 광장 · 관리자 화면</div>
    <div class="text-small text-mute">v1.0</div>
  </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
