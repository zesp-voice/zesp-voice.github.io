<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://www.gstatic.com https://script.google.com https://script.googleusercontent.com;">
<title>이스타항공 변화관리 의견 광장</title>
<meta name="description" content="이스타항공 전 임직원이 익명으로 변화관리 주제에 의견을 남기는 사내 광장">
<meta name="theme-color" content="#D20015">
<link rel="icon" type="image/png" sizes="128x128" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<header class="topbar">
  <div class="wrap topbar__inner">
    <a class="brand" href="./index.html">
      <span class="brand__icon" aria-hidden="true"></span>
      <span class="brand__lockup">
        <span class="brand__name">변화관리 의견 광장</span>
        <span class="brand__sub">이스타항공안전보안실</span>
      </span>
    </a>
    <nav class="topbar__nav">
      <a href="./index.html" aria-current="page">홈</a>
      <a href="./topics.html">주제</a>
      <a href="./about.html">변화관리란</a>
      <a href="./admin.html" id="nav-admin">관리자</a>
      <span id="admin-chip" class="admin-chip hidden">
        <a class="admin-chip__link" href="./admin.html" title="관리자 페이지로 이동">
          <span class="admin-chip__dot" aria-hidden="true"></span>
          <span class="admin-chip__label" id="admin-chip-label">관리자</span>
        </a>
        <button id="admin-signout" class="admin-chip__signout" title="관리자 로그아웃">로그아웃</button>
      </span>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <h1 class="hero__title">모두가 함께하는 <em>변화관리</em>.<br>당신의 의견을 들려주세요.</h1>
    <p class="hero__desc">
      <span>신규 취항·정책 개편·업무 프로세스 등 변화의 시작점에서</span>
      <span>걱정·고민·궁금증을 익명으로 자유롭게 남겨주세요.</span>
    </p>
    <div class="hero__stats">
      <div>
        <div class="hero__stat-num" id="stat-active">—</div>
        <div class="hero__stat-lbl">진행 중 주제</div>
      </div>
      <div>
        <div class="hero__stat-num" id="stat-comments">—</div>
        <div class="hero__stat-lbl">총 누적 의견</div>
      </div>
    </div>
  </div>
</section>

<main class="wrap section home-main">
  <div class="row" style="flex-wrap: wrap; gap: var(--sp-2) var(--sp-3); margin-bottom: var(--sp-5);">
    <h2 class="h-section" style="margin: 0;">진행 중인 주제</h2>
    <div class="row" style="gap: var(--sp-2); margin-left: auto;">
      <a id="active-more" class="section-more hidden" href="./topics.html">전체보기 ›</a>
      <span class="text-mute text-small" id="active-count"></span>
    </div>
  </div>
  <div id="active-topics" class="card-grid">
    <div class="empty" style="grid-column: 1 / -1;">
      <div class="spinner" aria-hidden="true"></div>
      <div class="empty__title">불러오는 중…</div>
    </div>
  </div>

  <hr class="divider" id="closed">

  <div class="row" style="flex-wrap: wrap; gap: var(--sp-2) var(--sp-3); margin-bottom: var(--sp-5);">
    <h2 class="h-section" style="margin: 0;">지난 주제</h2>
    <div class="row" style="gap: var(--sp-2); margin-left: auto;">
      <a id="closed-more" class="section-more hidden" href="./topics.html">전체보기 ›</a>
      <span class="text-mute text-small" id="closed-count"></span>
    </div>
  </div>
  <div id="closed-topics" class="card-grid"></div>
</main>

<footer class="footer">
  <div class="wrap footer__inner">
    <div>© EASTARJET 안전기획팀 · 변화관리 의견 광장</div>
  </div>
</footer>

<!-- Firebase v10 modular SDK -->
<script type="module" src="js/home.js"></script>
</body>
</html>
